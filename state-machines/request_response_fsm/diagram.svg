  <path class="arrow" d="M 238.685 141.7 C 202.502 174.917 166.319 174.917 130.136 141.7" style="stroke-width: 2.5; transform-box: fill-box; transform-origin: 50% 50%;" transform="matrix(-0.866025, 0.5, -0.5, -0.866025, 0.000026, 0.000001)"/>
</svg>